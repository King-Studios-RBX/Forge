name: Publish Forge to GitHub Packages

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: Intripath/setup-rokit@v1.0.0
        with:
          token: ${{ github.token }}

      - run: rokit install --no-trust-check

      - name: Install dependencies
        run: bun install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}

      - name: Configure npm auth
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_PACKAGES_TOKEN || github.token }}" > .npmrc
          echo "@king-studios-rbx:registry=https://npm.pkg.github.com" >> .npmrc

      - name: Prepare next version
        run: bun run version:next

      - name: Build package
        run: bun run compile

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
